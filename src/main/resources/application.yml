spring:
  application:
    name: recommendation
  datasource:
    url: jdbc:h2:file:./data/recommendation;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  error:
    include-message: always
app:
  tagging:
    extractor: keyword
    smart:
      enabled: false
      provider: openai
      model: gpt-5.4-nano
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com/v1/responses
      timeout: 10s
      max-topics: 5
      max-tags: 8
  recommendation:
    similarity-model: fixed-weight
    label-weights:
      topic: 0.7
      tag: 0.3
    interaction-weights:
      read: 1.0
      like: 3.0
      share: 5.0
    serendipity:
      quota: 0.1
  test-data:
    articles:
      enabled: true
      resource: classpath:testdata/articles.json
      publishers-resource: classpath:testdata/publishers.json
      authors-resource: classpath:testdata/authors.json
      users-resource: classpath:testdata/users.json
      interactions-resource: classpath:testdata/interactions.json
